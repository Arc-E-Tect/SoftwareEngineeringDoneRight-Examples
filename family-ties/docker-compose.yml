services:
  app:
    build: .
    image: familyties/app:latest
    depends_on:
      - postgres
      - wiremock
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/familyties
      SPRING_DATASOURCE_USERNAME: family
      SPRING_DATASOURCE_PASSWORD: ${SSL_KEYSTORE_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SSL_KEYSTORE_PASSWORD: ${SSL_KEYSTORE_PASSWORD}
    ports:
      - "8080:8080"
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: familyties
      POSTGRES_USER: family
      POSTGRES_PASSWORD: ${SSL_KEYSTORE_PASSWORD}
    ports:
      - "5432:5432"
  wiremock:
    image: wiremock/wiremock:3.13.2-3
    command: "--verbose --port 8080 --https-port 8443 --global-response-templating"
    volumes:
      - ./app/src/main/resources/wiremock:/home/wiremock
    ports:
      - "8443:8443"
      - "8089:8080"
