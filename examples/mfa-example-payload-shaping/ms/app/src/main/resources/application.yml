productName: "${PRODUCT_NAME:Family Ties}"
version: "${VERSION:0.0.1-SNAPSHOT}"

app:
  name: ${productName}
  version: ${version}

application:
  title: ${productName}
  version: ${version}

spring:
  application:
    name: ${productName}
  datasource:
    url: jdbc:h2:mem:familyties;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: ${H2_USERNAME:sa}
    password: ${H2_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    show-sql: false
  main:
    allow-bean-definition-overriding: true

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.hibernate.orm.jdbc.bind: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 8081
  error:
    include-message: always

familyties:
  pagination:
    max-size: 10
