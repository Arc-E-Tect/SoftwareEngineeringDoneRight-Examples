# Payload-Shaping MFA Example — Docker Compose (pre-built artifacts)
#
# Topology (plain HTTP, no auth, no TLS):
#
#   Browser → mfe (nginx :4200) → mfa (Spring Boot :8080) → ms (Spring Boot :8081)
#
# Pre-build all artifacts locally before starting the stack:
#
#   cd ms  && ./gradlew :app:bootJar -x test --no-daemon && cd ..
#   cd mfa && ./gradlew bootJar -x test --no-daemon       && cd ..
#   cd mfe && npm ci && npm run build                      && cd ..
#
# Start:  docker compose -f docker-compose.prebuilt.yml up --build
# Stop:   docker compose down -v
#
# Once running, open http://localhost:4200 in a browser.

services:

  # ── Microservice (Family Ties) ──────────────────────────────────────────────
  ms:
    build:
      context: ./ms
      dockerfile: Dockerfile-prebuilt
    image: payload-shaping-mfa/ms:latest
    environment:
      SPRING_PROFILES_ACTIVE: default
      H2_PASSWORD: ""
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3

  # ── Micro-Frontend Adapter (field-name-translating proxy) ───────────────────
  mfa:
    build:
      context: ./mfa
      dockerfile: Dockerfile-prebuilt
    image: payload-shaping-mfa/mfa:latest
    environment:
      SPRING_PROFILES_ACTIVE: payload-shaper
      MFE_ADAPTER_MICROSERVICE_BASE_URL: http://ms:8081
    ports:
      - "8080:8080"
    depends_on:
      ms:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3

  # ── Micro-Frontend (Angular via nginx) ─────────────────────────────────────
  mfe:
    build:
      context: ./mfe
      dockerfile: Dockerfile-prebuilt
    image: payload-shaping-mfa/mfe:latest
    ports:
      - "4200:80"
    depends_on:
      mfa:
        condition: service_healthy
