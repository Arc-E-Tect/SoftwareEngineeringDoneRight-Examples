# ── Local development overrides ───────────────────────────────────────────────
# Activate with: --spring.profiles.active=local
# This profile disables mTLS and H2 console, and provides local defaults.

server:
  port: 8080
  ssl:
    enabled: false

spring:
  h2:
    console:
      enabled: true
      path: /h2-console

mfe-adapter:
  session:
    secure: false   # Allow plain HTTP cookies in local dev

  mtls:
    enabled: false  # Disable mTLS; use plain HTTP for local services

  oidc-provider:
    issuer-uri: http://localhost:8090
    realm: local-dev
    client-id: mfe-adapter-local
    client-secret: local-secret

  authorization-service:
    base-url: http://localhost:8181

  microservice:
    base-url: http://localhost:8082

logging:
  level:
    com.arc_e_tect.book.sedr.mfeadapter: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
