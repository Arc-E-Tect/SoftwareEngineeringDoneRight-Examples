}

// QA task: runs a full verification pipeline in order
tasks.register('QA') {
	group = 'verification'
	description = 'Full QA: build, verify wiremock, contract, system and e2e tests'
	notCompatibleWithConfigurationCache("QA task requires proper Docker container lifecycle management which is not compatible with configuration cache")

	// Declare all verification steps as dependencies
	dependsOn 'build', 'testContractWiremock', 'testSystemWiremock', 'composeDown', 'testContract', 'testSystem', 'testE2E'
}
// Configure QA task ordering after project evaluation
afterEvaluate {
	tasks.named('testContractWiremock').configure { mustRunAfter 'build' }
	tasks.named('testSystemWiremock').configure { mustRunAfter 'testContractWiremock' }
	tasks.named('composeDown').configure { mustRunAfter 'testSystemWiremock' }
	tasks.named('testContract').configure { mustRunAfter 'composeDown' }
	tasks.named('testSystem').configure { mustRunAfter 'testContract' }
	tasks.named('testE2E').configure { mustRunAfter 'testSystem' }
}

jacoco {
	toolVersion = ftlibs.versions.jacoco.get()
}

def unitTest = tasks.named("test")
def allTestTasks = tasks.withType(Test)

tasks.named("jacocoTestReport") {
	dependsOn(unitTest)
	classDirectories.setFrom(layout.buildDirectory.dir("classes/java/main"))
	sourceDirectories.setFrom(layout.projectDirectory.dir("src/main/java"))
	reports {
		xml.required = true
		html.required = true
		html.outputLocation = layout.buildDirectory.dir("reports/jacoco/test")
	}
}

tasks.named("jacocoTestCoverageVerification") {
	dependsOn(unitTest)
	classDirectories.setFrom(layout.buildDirectory.dir("classes/java/main"))
	sourceDirectories.setFrom(layout.projectDirectory.dir("src/main/java"))
	executionData(unitTest.get().extensions.getByType(JacocoTaskExtension).destinationFile)
	violationRules {
		rule {
			limit {
				counter = "LINE"
				value = "COVEREDRATIO"
				minimum = 1.0  // 100% coverage (Lombok @Generated automatically excluded)
			}
		}
	}
}

tasks.register("jacocoAllTestReport", JacocoReport) {
    dependsOn(unitTest)

    executionData.setFrom(unitTest.map { it.extensions.getByType(JacocoTaskExtension).destinationFile })
    sourceDirectories.setFrom(layout.projectDirectory.dir("src/main/java"))
    classDirectories.setFrom(layout.buildDirectory.dir("classes/java/main"))

    reports {
        xml.required = true
        html.required = true
        html.outputLocation = layout.buildDirectory.dir("reports/jacoco/all")
    }
}

tasks.named("testContract") {
	outputs.dir(snippetsDir)
}

tasks.named("asciidoctor", AsciidoctorTask) {
	dependsOn(tasks.named("docGen"))
	configurations("asciidoctorExt")
	inputs.dir(snippetsDir)
	baseDirFollowsSourceFile()
	sourceDir = file("src/docs/asciidoc")
	outputDir = layout.buildDirectory.dir("docs/asciidoc").get().asFile
	attributes("snippets": snippetsDir.get().asFile)
	notCompatibleWithConfigurationCache("Asciidoctor plugin 4.0.5 is not configuration-cache safe; run docs without CC or upgrade plugin when CC support lands")
}

tasks.register("docs") {
	group = "documentation"
	description = "Generates project documentation via Asciidoctor."
	notCompatibleWithConfigurationCache("Docs wrapper runs Asciidoctor, which is not configuration-cache safe")
	dependsOn(tasks.named("asciidoctor"))
}

tasks.named("check") {
	dependsOn(tasks.named("jacocoTestCoverageVerification"))
	dependsOn(tasks.named("jacocoAllTestReport"))
}

dependencyCheck {
	nvd.apiKey = System.getenv('NVD_APIKEY_SEDR')
	nvd.delay = 16000
	analyzers.assemblyEnabled = false
}

tasks.cyclonedxDirectBom {
	includeConfigs = ["runtimeClasspath", "compileClasspath"]
	skipConfigs = [".*test.*", ".*Test.*"]

	schemaVersion = Version.VERSION_16
	componentName = "Family-Ties"
	projectType = Component.Type.APPLICATION

	def entity = new OrganizationalEntity()
	entity.setName("Arc-E-Tect")

	def contact = new OrganizationalContact()
	contact.setName("Arc-E-Tect")
	contact.setEmail("iwan@arc-e-tect.com")

	entity.addContact(contact)

	organizationalEntity = entity
}

check.dependsOn cyclonedxDirectBom
check.dependsOn generateLicenseReport

ext {
	productName = project.findProperty('productName') ?: 'Family Ties'
	appVersion = project.version
}

bootJar {
	manifest {
		attributes(
				'Implementation-Title'  : productName,
				'Implementation-Version': appVersion,
				'Built-By'              : System.properties['user.name'],
				'Build-Timestamp'       : new java.text.SimpleDateFormat("yyyy-MM-dd'T'HH:mm:ss").format(new Date()),
				'Created-By'            : "Gradle ${gradle.gradleVersion}",
				'Build-Jdk'             : "${System.properties['java.version']} (${System.properties['java.vendor']} ${System.properties['java.vm.version']})",
				'Build-OS'              : "${System.properties['os.name']} ${System.properties['os.arch']} ${System.properties['os.version']}"
		)
	}
}

springBoot {
	buildInfo {
		properties {
			name = "${project.name}"
			additional = [
					by: System.properties['user.name'],
					continuousIntegration: System.getenv('CI') ? true: false,
			]
		}
	}
}

tasks.named('bootRun') {
	environment 'PRODUCT_NAME', productName
	environment 'VERSION', appVersion
	environment 'SPRING_PROFILES_ACTIVE', System.getenv('SPRING_PROFILES_ACTIVE') ?: 'dev'
}
