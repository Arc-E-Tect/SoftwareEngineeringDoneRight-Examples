// ==============================================================================
// E2E Test Automatic Lifecycle Management
// ==============================================================================
// The testE2E task automatically manages the complete Docker Compose lifecycle:
//
// 1. Starts Docker Compose stack via dependsOn(e2eComposeUp)
//    - Launches postgres:18-alpine on localhost:5432
	//    - Launches vanilla-ms/app:e2e on localhost:8081 (HTTP)
//
// 2. Loads non-secret environment variables from app/src/testE2E/resources/.env
//    - Same .env file used by Docker Compose (via --env-file flag)
//    - Variables injected into test JVM for REST client configuration
	//    - Secrets remain environment-only (e.g. POSTGRES_PASSWORD, H2_PASSWORD)
//
// 3. Runs 26 E2E Cucumber scenarios as external REST clients
//    - Tests connect to containerized app over HTTPS
//    - Uses real PostgreSQL database (not mocked)
//
// 4. Cleans up via finalizedBy(e2eComposeDown) - runs even if tests fail
//    - Stops containers gracefully
//    - Removes containers and networks
//
// Usage: ./gradlew testE2E
//
// This configuration uses afterEvaluate{} to ensure the testE2E task exists
// (created by the testing suites DSL) before applying dependencies.
// ==============================================================================
afterEvaluate {
	// Configure test dependencies to create a proper testing pipeline:
	// 1. testSystem depends on testComponent
	// 2. testContract depends on testComponent (runs in parallel with testSystem)
	// 3. testE2E stays independent to isolate environment/infrastructure issues
	// Note: To verify WireMock stubs, run testSystemWiremock (automatic Docker Compose lifecycle)
	
	def testSystemTask = tasks.findByName('testSystem')
	if (testSystemTask != null) {
		testSystemTask.dependsOn tasks.named('testComponent')
			testSystemTask.dependsOn tasks.named('validateSystemEnvironment')
	}
	
	def testContractTask = tasks.findByName('testContract')
	if (testContractTask != null) {
		testContractTask.dependsOn tasks.named('testComponent')
	}
	
	/*
	 * WireMock Stub Verification Task
	 * 
	 * The testSystemWiremock task verifies consumer-driven contract compliance
	 * by running system tests against WireMock stubs instead of the real application.
	 * 
	 * Automatic workflow (Docker Compose plugin manages lifecycle):
	 *   ./gradlew testSystemWiremock
	 * 
	 * The plugin automatically:
	 *   1. Starts WireMock container on localhost:8081 with stubs from src/main/resources/wiremock
	 *   2. Sets FAMILYTIES_BASE_URL to point tests at WireMock
	 *   3. Runs system test scenarios against the stubs
	 *   4. Stops and removes WireMock container (even on test failure)
	 * 
	 * This ensures frontend teams can develop against stable WireMock contracts
	 * while backend services are built, with confidence that both honor the same API.
	 */
	tasks.register('testSystemWiremock', Test) {
		group = 'verification'
		description = 'Run system tests against WireMock stubs (consumer-driven contract verification)'
		dependsOn tasks.named('validateSystemEnvironment')
		
		// Use the same test sources as testSystem
		testClassesDirs = testing.suites.testSystem.sources.output.classesDirs
		classpath = testing.suites.testSystem.sources.runtimeClasspath
		
		// Configure JUnit and logging
		useJUnitPlatform()
		testLogging {
			events "PASSED", "FAILED", "SKIPPED"
			exceptionFormat = 'full'
			showStandardStreams = true
		}
		
		// Byte Buddy agent for mocking
		jvmArgs "-javaagent:${configurations.byteBuddyAgent.singleFile}"
		
		// Point tests at WireMock instead of real application
		environment 'FAMILYTIES_BASE_URL', 'http://localhost:8081/v1/familyties'
		
		// Pass through required credentials
		environment 'H2_USERNAME', System.getenv('H2_USERNAME') ?: System.getProperty('H2_USERNAME')
		environment 'H2_PASSWORD', System.getenv('H2_PASSWORD')
		environment 'POSTGRES_DB', System.getenv('POSTGRES_DB') ?: System.getProperty('POSTGRES_DB')
		environment 'POSTGRES_USER', System.getenv('POSTGRES_USER') ?: System.getProperty('POSTGRES_USER')
		environment 'POSTGRES_PASSWORD', System.getenv('POSTGRES_PASSWORD') ?: System.getProperty('POSTGRES_PASSWORD')
		environment 'PRODUCT_NAME', productName
		environment 'VERSION', appVersion
		
		// Docker Compose plugin manages WireMock lifecycle automatically
		// via dockerCompose.isRequiredBy() configured below
	}
	
	/*
	 * WireMock OpenAPI Contract Verification Task
	 * 
	 * The testContractWiremock task verifies that WireMock stubs conform to the
	 * OpenAPI specification, ensuring syntactic compliance (contract tests).
	 * 
	 * Automatic workflow (Docker Compose plugin manages lifecycle):
	 *   ./gradlew testContractWiremock
	 * 
	 * The plugin automatically:
	 *   1. Starts WireMock container on localhost:8081 with stubs
	 *   2. Sets FAMILYTIES_BASE_URL environment variable (for future REST client tests)
	 *   3. Runs Spring REST Docs contract tests
	 *   4. Stops and removes WireMock container (even on test failure)
	 * 
	 * Note: Current contract tests use MockMvc (controller-layer testing) and don't
	 * make actual HTTP calls to WireMock. However, they validate API contracts that
	 * WireMock must implement. Combined with testSystemWiremock, this ensures:
	 *   - Syntactically correct (matches OpenAPI spec) → testContractWiremock validates spec
	 *   - Semantically correct (matches behavior) → testSystemWiremock validates WireMock
	 * 
	 * Future: If contract tests are refactored to REST clients, they will automatically
	 * use FAMILYTIES_BASE_URL to test WireMock directly.
	 */
	tasks.register('testContractWiremock', Test) {
		group = 'verification'
		description = 'Run contract tests with WireMock environment (validates OpenAPI spec + prepares for REST client tests)'
		dependsOn tasks.named('validateSystemEnvironment')
		
		// Use the same test sources as testContract
		testClassesDirs = testing.suites.testContract.sources.output.classesDirs
		classpath = testing.suites.testContract.sources.runtimeClasspath
		
		// Configure JUnit and logging
		useJUnitPlatform()
		testLogging {
			events "PASSED", "FAILED", "SKIPPED"
			exceptionFormat = 'full'
			showStandardStreams = true
		}
		
		// Byte Buddy agent for mocking
		jvmArgs "-javaagent:${configurations.byteBuddyAgent.singleFile}"
		
		// Point tests at WireMock for future REST client tests
		environment 'FAMILYTIES_BASE_URL', 'http://localhost:8081/v1/familyties'
		
		// Pass through required credentials
		environment 'H2_USERNAME', System.getenv('H2_USERNAME') ?: System.getProperty('H2_USERNAME')
		environment 'H2_PASSWORD', System.getenv('H2_PASSWORD')
		environment 'POSTGRES_DB', System.getenv('POSTGRES_DB') ?: System.getProperty('POSTGRES_DB')
		environment 'POSTGRES_USER', System.getenv('POSTGRES_USER') ?: System.getProperty('POSTGRES_USER')
		environment 'POSTGRES_PASSWORD', System.getenv('POSTGRES_PASSWORD') ?: System.getProperty('POSTGRES_PASSWORD')
		environment 'PRODUCT_NAME', productName
		environment 'VERSION', appVersion
		
		// Docker Compose plugin manages WireMock lifecycle automatically
		// via dockerCompose.isRequiredBy() configured below
	}
	
	/*
	 * Complete WireMock Verification Task
	 * 
	 * Runs both semantic (system) and syntactic (contract) verification against WireMock.
	 * This comprehensive test ensures WireMock is a complete drop-in replacement:
	 *   - testSystemWiremock: Validates behavior matches real application
	 *   - testContractWiremock: Validates contract compliance
	 * 
	 * Usage: ./gradlew verifyWiremock --no-configuration-cache
	 */
	tasks.register('verifyWiremock') {
		group = 'verification'
		description = 'Complete WireMock verification: semantic (system) + syntactic (contract) tests'
		dependsOn tasks.named('testSystemWiremock')
		dependsOn tasks.named('testContractWiremock')
	}
	
	// ==============================================================================
	// Docker Compose Plugin Configuration for WireMock
	// ==============================================================================
	// Automatic WireMock container management for system test verification
	dockerCompose {
		useComposeFiles = [project.parent.file('docker-compose.yml').absolutePath]
		stopContainers = true  // Stop containers after tests
		removeContainers = true  // Clean up containers
		removeVolumes = true  // Clean up volumes
		startedServices = ['wiremock']  // Only start the wiremock service
		isRequiredBy(tasks.named('testSystemWiremock'))
		isRequiredBy(tasks.named('testContractWiremock'))
	}
	
	def testE2ETask = tasks.findByName('testE2E')
	if (testE2ETask != null) {
		// Load environment variables from .env file
		def e2eEnvFile = file('src/testE2E/resources/.env')
		if (e2eEnvFile.exists()) {
			def envVars = loadEnvFile(e2eEnvFile)
			e2eManagedEnvKeys.each { key ->
				def value = envVars[key]
				if (value) {
				testE2ETask.environment key, value
				}
			}
		}

		// POSTGRES_PASSWORD is environment-only and never read from .env files
		testE2ETask.environment 'POSTGRES_PASSWORD', System.getenv('POSTGRES_PASSWORD')
		// H2_PASSWORD is environment-only and never read from .env files
		testE2ETask.environment 'H2_PASSWORD', System.getenv('H2_PASSWORD')

		// Validate E2E env consistency before Docker Compose lifecycle / tests
		testE2ETask.dependsOn tasks.named('validateE2EEnvironment')
	}

	dockerCompose {
		e2e {
			useComposeFiles = [project.file('src/testE2E/resources/docker-compose.e2e.yml').absolutePath]
			startedServices = ['postgres', 'family-ties-app']
			stopContainers = true
			removeContainers = true
			removeVolumes = true
			isRequiredBy(tasks.named('testE2E'))
		}
	}

	tasks.named('e2eComposeUp').configure {
		dependsOn tasks.named('validateE2EEnvironment')
	}
}

