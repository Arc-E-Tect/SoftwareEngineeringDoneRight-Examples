// Helper function to load environment variables from .env file
def loadEnvFile(File file) {
	def env = [:]
	if (file.exists()) {
		file.readLines().each { line ->
			// Skip comments and empty lines
			if (!line.trim().startsWith('#') && line.contains('=')) {
				def parts = line.split('=', 2)
				if (parts.length == 2) {
					env[parts[0].trim()] = parts[1].trim()
				}
			}
		}
	}
	return env
}

def e2eManagedEnvKeys = ['POSTGRES_DB', 'POSTGRES_USER']

// Load .env file if it exists (for local development)
// CI/CD should set environment variables directly
def envFile = project.parent.file('.env')
if (envFile.exists()) {
	envFile.readLines().each { line ->
		line = line.trim()
		if (line && !line.startsWith('#') && line.contains('=')) {
			def parts = line.split('=', 2)
			if (parts.length == 2) {
				def key = parts[0].trim()
				def value = parts[1].trim()
				// Only set if not already in environment (env vars take precedence)
				if (key && value && !System.getenv(key)) {
					System.setProperty(key, value)
				}
			}
		}
	}
}

