tasks.register('validateE2EEnvironment') {
	group = 'verification'
	description = 'Validates E2E environment consistency between root and E2E .env files'
	def rootEnvFile = project.parent.file('.env')
	def e2eEnvFile = file('src/testE2E/resources/.env')
	doLast {
		def errors = []
		def parseEnv = { File targetFile ->
			def env = [:]
			if (targetFile.exists()) {
				targetFile.readLines().each { line ->
					if (!line.trim().startsWith('#') && line.contains('=')) {
						def parts = line.split('=', 2)
						if (parts.length == 2) {
							env[parts[0].trim()] = parts[1].trim()
						}
					}
				}
			}
			env
		}

		if (!rootEnvFile.exists()) {
			errors << "Missing ${rootEnvFile}. Run ./setup-test-env.sh first."
		}

		if (!e2eEnvFile.exists()) {
			errors << "Missing ${e2eEnvFile}. Run ./setup-test-env.sh first."
		}

		if (errors.isEmpty()) {
			def rootEnv = parseEnv(rootEnvFile)
			def e2eEnv = parseEnv(e2eEnvFile)

			e2eManagedEnvKeys.each { key ->
				def rootValue = rootEnv[key]
				def e2eValue = e2eEnv[key]
				if (!rootValue) {
					errors << "Missing ${key} in ${rootEnvFile}"
				}
				if (!e2eValue) {
					errors << "Missing ${key} in ${e2eEnvFile}"
				}
				if (rootValue && e2eValue && rootValue != e2eValue) {
					errors << "Mismatched value for ${key} between ${rootEnvFile} and ${e2eEnvFile}"
				}
			}

			if (rootEnv.containsKey('POSTGRES_PASSWORD') || e2eEnv.containsKey('POSTGRES_PASSWORD')) {
				errors << 'POSTGRES_PASSWORD must be environment-only and must not be persisted in .env files'
			}

			if (rootEnv.containsKey('H2_PASSWORD') || e2eEnv.containsKey('H2_PASSWORD')) {
				errors << 'H2_PASSWORD must be environment-only and must not be persisted in .env files'
			}
		}

		if (!System.getenv('POSTGRES_PASSWORD')) {
			errors << 'Missing POSTGRES_PASSWORD in the shell environment'
		}

		if (!System.getenv('H2_PASSWORD')) {
			errors << 'Missing H2_PASSWORD in the shell environment'
		}

		if (!errors.isEmpty()) {
			throw new GradleException("E2E environment validation failed:\n - ${errors.join('\n - ')}")
		}

		println '✓ E2E environment validation passed'
	}
}

tasks.register('validateSystemEnvironment') {
	group = 'verification'
	description = 'Validates system test environment prerequisites and secret policy'
	def rootEnvFile = project.parent.file('.env')
	doLast {
		def errors = []
		def parseEnv = { File targetFile ->
			def env = [:]
			if (targetFile.exists()) {
				targetFile.readLines().each { line ->
					if (!line.trim().startsWith('#') && line.contains('=')) {
						def parts = line.split('=', 2)
						if (parts.length == 2) {
							env[parts[0].trim()] = parts[1].trim()
						}
					}
				}
			}
			env
		}
		def rootEnv = parseEnv(rootEnvFile)

		['POSTGRES_PASSWORD', 'H2_PASSWORD'].each { key ->
			if (rootEnv.containsKey(key)) {
				errors << "${key} must be environment-only and must not be persisted in ${rootEnvFile}"
			}
		}

		['POSTGRES_PASSWORD', 'H2_PASSWORD'].each { key ->
			if (!(System.getenv(key) ?: System.getProperty(key))) {
				errors << "Missing ${key} in the shell environment"
			}
		}

		['POSTGRES_DB', 'POSTGRES_USER'].each { key ->
			def value = System.getenv(key) ?: System.getProperty(key) ?: rootEnv[key]
			if (!value) {
				errors << "Missing ${key} (set it via environment or ${rootEnvFile})"
			}
		}

		if (!errors.isEmpty()) {
			throw new GradleException("System environment validation failed:\n - ${errors.join('\n - ')}")
		}

		println '✓ System environment validation passed'
	}
}

/*
 * E2E Testing Workflow
 * 
 * E2E tests run against a production-like Docker Compose stack.
 * The Gradle dockerCompose plugin manages lifecycle and health waiting.
 * 
 * Automatic workflow:
 *   1. ./gradlew testE2E         # Start stack, run tests, clean up
 * 
 * Manual debugging workflow:
 *   1. ./gradlew e2eComposeUp
 *   2. ./gradlew testE2E
 *   3. ./gradlew e2eComposeDown
 *   4. ./gradlew e2eComposeLogs  # optional
 * 
 * The plugin-managed compose stack includes:
 *   - vanilla-ms-app (containerized application on :8081)
 *   - postgres (database on :5432)
 * 
// Tests connect to running containers via HTTP REST calls.
 */

