services:
  app:
    build: .
    image: vanilla-ms/app:latest
    depends_on:
      - postgres
      - wiremock
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/familyties
      SPRING_DATASOURCE_USERNAME: familyties
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: familyties
      POSTGRES_USER: familyties
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
  wiremock:
    image: wiremock/wiremock:3.13.2-3
    command: "--verbose --port 8081 --global-response-templating"
    volumes:
      - ./app/src/main/resources/wiremock:/home/wiremock
    ports:
      - "8081:8081"
