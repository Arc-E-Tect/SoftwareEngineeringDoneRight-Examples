name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 7 * * 5'  # Weekly at Friday 07:00 UTC
  workflow_dispatch:

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run NVD Dependency Check (with timeout resilience)
        run: |
          set +e
          timeout 900 ./gradlew dependencyCheckAnalyze
          exit_code=$?
          set -e
          
          if [ $exit_code -eq 124 ]; then
            echo "⚠️  NVD dependency check timed out (900s). This may be due to NVD service availability."
            echo "The build will continue, but please check the NVD database manually."
            exit 0
          elif [ $exit_code -eq 503 ]; then
            echo "⚠️  NVD service returned HTTP 503. This is a temporary service issue."
            echo "The build will continue. Please try again later."
            exit 0
          elif [ $exit_code -ne 0 ]; then
            exit $exit_code
          fi

      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: build/reports/dependency-check-report.html
          retention-days: 30
