name: Generate Keystore

on:
  workflow_call:
    inputs:
      keystore_path:
        description: "Path to the PKCS12 keystore to create (relative to repo root)"
        required: true
        type: string
      alias:
        description: "Alias for the key entry"
        required: false
        type: string
        default: familyties
      dname:
        description: "Distinguished name for the certificate"
        required: false
        type: string
        default: "CN=localhost, OU=Family Ties, O=Arc-E-Tect, L=Amsterdam, S=NH, C=NL"
      key_alg:
        description: "Key algorithm"
        required: false
        type: string
        default: RSA
      key_size:
        description: "Key size"
        required: false
        type: number
        default: 2048
      validity_days:
        description: "Certificate validity in days"
        required: false
        type: number
        default: 825
    secrets:
      ssl_keystore_password:
        description: "Password for the keystore and key"
        required: true

jobs:
  generate-keystore:
    name: Generate PKCS12 keystore
    runs-on: ubuntu-latest

    env:
      KEYSTORE_PATH: ${{ inputs.keystore_path }}
      KEY_ALIAS: ${{ inputs.alias }}
      DNAME: ${{ inputs.dname }}
      KEY_ALG: ${{ inputs.key_alg }}
      KEY_SIZE: ${{ inputs.key_size }}
      VALIDITY_DAYS: ${{ inputs.validity_days }}
      SSL_KEYSTORE_PASSWORD: ${{ secrets.ssl_keystore_password }}

    steps:
      - name: Ensure workspace present
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate keystore
        run: |
          if [ -z "$SSL_KEYSTORE_PASSWORD" ]; then
            echo "SSL_KEYSTORE_PASSWORD is not set; define the secret" >&2
            exit 1
          fi

          DEST_DIR=$(dirname "$KEYSTORE_PATH")
          mkdir -p "$DEST_DIR"
          rm -f "$KEYSTORE_PATH"

          keytool -genkeypair \
            -alias "$KEY_ALIAS" \
            -keyalg "$KEY_ALG" \
            -keysize "$KEY_SIZE" \
            -validity "$VALIDITY_DAYS" \
            -storetype PKCS12 \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$SSL_KEYSTORE_PASSWORD" \
            -keypass "$SSL_KEYSTORE_PASSWORD" \
            -dname "$DNAME"

      - name: Show keystore location
        run: |
          ls -l "$KEYSTORE_PATH"
