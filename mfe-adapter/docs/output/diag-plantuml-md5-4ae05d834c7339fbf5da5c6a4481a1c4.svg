<?plantuml 1.2026.2?><svg contentStyleType='text/css' data-diagram-type='SALT' height='173px' preserveAspectRatio='none' style='width:604px;height:173px;background:#FFFFFF;' version='1.1' viewBox='0 0 604 173' width='604px' xmlns:xlink='http://www.w3.org/1999/xlink' xmlns='http://www.w3.org/2000/svg' zoomAndPan='magnify'><defs/><g><text fill='#000000' font-family='sans-serif' font-size='12' font-weight='bold' lengthAdjust='spacing' textLength='213.9141' x='6' y='17.6016'>Conceptual: Complexity Over Time</text><text fill='#000000' font-family='sans-serif' font-size='12' font-style='italic' lengthAdjust='spacing' textLength='265.8516' x='6' y='33.7344'>(Dragoni17, Newman15, Abbes11, ISO25010)</text><line style='stroke:#AAAAAA;stroke-width:1;' x1='6' x2='502.2695' y1='40.7656' y2='40.7656'/><line style='stroke:#AAAAAA;stroke-width:1;' x1='6' x2='502.2695' y1='42.7656' y2='42.7656'/><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='71.1035' x='6' y='57.8672'>Architecture</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='27.7793' x='503.2695' y='57.8672'>Early</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='21.3574' x='533.0488' y='57.8672'>Mid</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='40.4941' x='556.4063' y='57.8672'>Mature</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='19.7695' x='6' y='74'>BFF</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='7.5879' x='503.2695' y='74'>1</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='7.5879' x='533.0488' y='74'>3</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='7.5879' x='556.4063' y='74'>7</text><text fill='#0000